<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obra VDS - Prestação de Contas</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">VDS</div>
        <div>
          <h1>Obra VDS</h1>
          <p>Prestação de Contas</p>
        </div>
      </div>

      <nav class="nav" aria-label="Navegação principal">
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="catalogo">Catálogo</button>
        <button class="nav-item" data-view="compras">Compras</button>
        <button class="nav-item" data-view="configuracoes">Configurações</button>
      </nav>

      <div class="profile-card">
        <strong>Modo</strong>
        <select id="perfilSelect" class="perfil-select-control">
          <option value="admin">Admin</option>
          <option value="visualizador">Financiador</option>
        </select>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Obra VDS</p>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="top-actions">
          <button id="syncButton" class="button secondary icon-only" title="Sincronizar">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" class="sync-icon-svg" style="display: inline-block; vertical-align: middle; margin-right: 4px;"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            <span class="btn-text">Sincronizar</span>
          </button>
          <button id="exportJsonButton" class="button secondary hide-mobile">Exportar JSON</button>
        </div>
      </header>

      <div id="toast" class="toast hidden"></div>

      <section id="dashboardView" class="view active"></section>
      <section id="catalogoView" class="view"></section>
      <section id="comprasView" class="view"></section>
      <section id="configuracoesView" class="view"></section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" aria-label="Navegação móvel">
    <button class="mobile-nav-item active" data-view="dashboard">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Dashboard</span>
    </button>
    <button class="mobile-nav-item" data-view="catalogo">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      <span>Catálogo</span>
    </button>
    <button class="mobile-nav-item" data-view="compras">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
      <span>Compras</span>
    </button>
    <button class="mobile-nav-item" data-view="configuracoes">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      <span>Configurações</span>
    </button>
  </nav>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
